; =============================================================================
; SECTION 8 - FREQUENCY DERIVATION
; =============================================================================
; Five additive components per wheel:
;   FreqMin                              hardware floor (RigConfig_BST.ini)
;   + Load * LoadBand                    chassis weight shifts pitch in corners
;   + Pow(SlipComp, 0.8) * SlipBand     grip state carries freq across the notch
;   + SpeedHz                            gentle pitch rise with speed
;   + FreqOff_xx                         compliance offset + temperature offset
;
; SlipComp: SA weighted 0.7, SR 0.3. Lateral grip state is primary.
; Pow(0.8): sub-linear - rises fast at low slip, flattens near ceiling.
; FL/FR use front rig params (BST-2). RL/RR use rear rig params (BST-1.0).
; All outputs clamped to [FreqMin, FreqMax] per hardware limits in RigConfig.

[Variable]
name='SlipComp_FL'
value=Min([context.NormSA_FL_sc] * 0.7 + [context.NormSR_FL_sc] * 0.3, 1.5)

[Variable]
name='SlipComp_FR'
value=Min([context.NormSA_FR_sc] * 0.7 + [context.NormSR_FR_sc] * 0.3, 1.5)

[Variable]
name='SlipComp_RL'
value=Min([context.NormSA_RL_sc] * 0.7 + [context.NormSR_RL_sc] * 0.3, 1.5)

[Variable]
name='SlipComp_RR'
value=Min([context.NormSA_RR_sc] * 0.7 + [context.NormSR_RR_sc] * 0.3, 1.5)

; --- FUNDAMENTAL FREQUENCY (Variable then Export, so HarmFreq can reference via context) ---

[Variable]
name='Freq_FL_v'
value=Min(Max([DataCorePlugin.ExternalScript.Rig_FL_FreqMin] + [context.LoadFL] * [DataCorePlugin.ExternalScript.Rig_FL_LoadBand] + Pow(Max([context.SlipComp_FL], 0.0), 0.8) * [DataCorePlugin.ExternalScript.Rig_FL_SlipBand] + [context.SpeedHz] + [context.FreqOff_FL], [DataCorePlugin.ExternalScript.Rig_FL_FreqMin]), [DataCorePlugin.ExternalScript.Rig_FL_FreqMax])

[ExportProperty]
name='Freq_FL'
value=[context.Freq_FL_v]

[Variable]
name='Freq_FR_v'
value=Min(Max([DataCorePlugin.ExternalScript.Rig_FR_FreqMin] + [context.LoadFR] * [DataCorePlugin.ExternalScript.Rig_FR_LoadBand] + Pow(Max([context.SlipComp_FR], 0.0), 0.8) * [DataCorePlugin.ExternalScript.Rig_FR_SlipBand] + [context.SpeedHz] + [context.FreqOff_FR], [DataCorePlugin.ExternalScript.Rig_FR_FreqMin]), [DataCorePlugin.ExternalScript.Rig_FR_FreqMax])

[ExportProperty]
name='Freq_FR'
value=[context.Freq_FR_v]

[Variable]
name='Freq_RL_v'
value=Min(Max([DataCorePlugin.ExternalScript.Rig_RL_FreqMin] + [context.LoadRL] * [DataCorePlugin.ExternalScript.Rig_RL_LoadBand] + Pow(Max([context.SlipComp_RL], 0.0), 0.8) * [DataCorePlugin.ExternalScript.Rig_RL_SlipBand] + [context.SpeedHz] + [context.FreqOff_RL], [DataCorePlugin.ExternalScript.Rig_RL_FreqMin]), [DataCorePlugin.ExternalScript.Rig_RL_FreqMax])

[ExportProperty]
name='Freq_RL'
value=[context.Freq_RL_v]

[Variable]
name='Freq_RR_v'
value=Min(Max([DataCorePlugin.ExternalScript.Rig_RR_FreqMin] + [context.LoadRR] * [DataCorePlugin.ExternalScript.Rig_RR_LoadBand] + Pow(Max([context.SlipComp_RR], 0.0), 0.8) * [DataCorePlugin.ExternalScript.Rig_RR_SlipBand] + [context.SpeedHz] + [context.FreqOff_RR], [DataCorePlugin.ExternalScript.Rig_RR_FreqMin]), [DataCorePlugin.ExternalScript.Rig_RR_FreqMax])

[ExportProperty]
name='Freq_RR'
value=[context.Freq_RR_v]

; --- HARMONIC FREQUENCIES (pre-capped, ready for ShakeIt Frequency field) ---
; HarmFreq_XX_n = Freq_XX * HarmMult^n, clamped to per-wheel FreqMax.
; Adjust Rig_[FL|FR|RL|RR]_HarmMult in RigConfig_BST.ini to change
; the detuning interval per wheel (see comments there for ratio guide).

[ExportProperty]
name='HarmFreq_FL_1'
value=Min([context.Freq_FL_v] * [DataCorePlugin.ExternalScript.Rig_FL_HarmMult], [DataCorePlugin.ExternalScript.Rig_FL_FreqMax])

[ExportProperty]
name='HarmFreq_FL_2'
value=Min([context.Freq_FL_v] * Pow([DataCorePlugin.ExternalScript.Rig_FL_HarmMult], 2), [DataCorePlugin.ExternalScript.Rig_FL_FreqMax])

[ExportProperty]
name='HarmFreq_FL_3'
value=Min([context.Freq_FL_v] * Pow([DataCorePlugin.ExternalScript.Rig_FL_HarmMult], 3), [DataCorePlugin.ExternalScript.Rig_FL_FreqMax])

[ExportProperty]
name='HarmFreq_FR_1'
value=Min([context.Freq_FR_v] * [DataCorePlugin.ExternalScript.Rig_FR_HarmMult], [DataCorePlugin.ExternalScript.Rig_FR_FreqMax])

[ExportProperty]
name='HarmFreq_FR_2'
value=Min([context.Freq_FR_v] * Pow([DataCorePlugin.ExternalScript.Rig_FR_HarmMult], 2), [DataCorePlugin.ExternalScript.Rig_FR_FreqMax])

[ExportProperty]
name='HarmFreq_FR_3'
value=Min([context.Freq_FR_v] * Pow([DataCorePlugin.ExternalScript.Rig_FR_HarmMult], 3), [DataCorePlugin.ExternalScript.Rig_FR_FreqMax])

[ExportProperty]
name='HarmFreq_RL_1'
value=Min([context.Freq_RL_v] * [DataCorePlugin.ExternalScript.Rig_RL_HarmMult], [DataCorePlugin.ExternalScript.Rig_RL_FreqMax])

[ExportProperty]
name='HarmFreq_RL_2'
value=Min([context.Freq_RL_v] * Pow([DataCorePlugin.ExternalScript.Rig_RL_HarmMult], 2), [DataCorePlugin.ExternalScript.Rig_RL_FreqMax])

[ExportProperty]
name='HarmFreq_RL_3'
value=Min([context.Freq_RL_v] * Pow([DataCorePlugin.ExternalScript.Rig_RL_HarmMult], 3), [DataCorePlugin.ExternalScript.Rig_RL_FreqMax])

[ExportProperty]
