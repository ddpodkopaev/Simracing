; =============================================================================
; SECTION 9 - DISPLAY EXPORTS
; =============================================================================
; All Disp_ variables and exports, grouped into three intuitive signal layers.
; This section is overlay-only — nothing here feeds back into the tactile pipeline.
;
; The three layers, plotted together on each chart:
;
;   DRIVER INPUT   — what the driver is requesting (pedal / steering / slip angle)
;   TYRE POTENTIAL — what the car can currently deliver, given compound and pressure
;   CAR OUTPUT     — what the physics simulation is actually producing (measured G)
;
; Reading the gaps:
;   Input ↔ Output gap    → utilisation efficiency (closing it = better driving)
;   Output ↔ Potential gap → unused grip margin (closing it = car at its limit)
;   Potential ↔ Axis top  → car class headroom vs F1 (fixed; doesn't change)
;
; All G charts share a fixed Y axis ceiling at F1_max * 1.1.
; Axis max never rescales while driving — the headroom gap is the signal.
;
; G-force sign convention (AC EVO shared memory, verify in property browser):
;   accG01 = lateral    (sign may differ left vs right — Abs() used throughout)
;   accG02 = longitudinal (positive = acceleration, negative = braking)
; Pedals (GameRawData.Physics.gas / .brake): native 0-1.
; Steering (DataCorePlugin.GameData.NewData.Steer): -1 to 1 (normalised to lock).
;   If steer reads rail-to-rail instantly, switch to raw degrees from
;   GameRawData.Physics.steer and normalise by maximum lock angle.


; =============================================================================
; 9a — REFERENCE CONFIG
; Tunable constants. Only affect display. No effect on tactile pipeline.
; =============================================================================

; Slip angle reference lines for SA/SR chart — in radians, matching AC EVO units.
; Each marks a category's typical peak grip angle (where the tyre works hardest).
;   F1 slick: narrow window, stiffer carcass — peaks early, unforgiving past limit.
;   Road:     wider window, more compliant — broader peak, more progressive falloff.
;   Wet:      widest window — tyre needs large slip angles to generate heat and grip.
[Variable]
name='Disp_SA_F1_v'
value=0.052

[Variable]
name='Disp_SA_Road_v'
value=0.122

[Variable]
name='Disp_SA_Wet_v'
value=0.209

; Slip ratio reference lines (lockup/wheelspin threshold per category).
; Slicks lock up at lower SR — tyre-road contact patch saturates quickly.
; Road and wet compounds tolerate more longitudinal slip before losing traction.
[Variable]
name='Disp_SR_F1_v'
value=0.07

[Variable]
name='Disp_SR_Road_v'
value=0.15

[Variable]
name='Disp_SR_Wet_v'
value=0.25

; G-force performance ceilings.
; F1 values are the absolute axis top (fixed at F1 * 1.1).
; Road values are the lower bound at 2.8 bar (TC=0, P_Stiff) — road car territory.
; The lerp between them (via TC_FL) gives the current car's estimated capability.
;
;   F1 accel:  ~2 G  (traction-limited, rear axle; aerodynamic grip above ~150 km/h)
;   F1 brake:  ~5 G  (carbon brakes + aero; peak in braking zone entry)
;   F1 lateral:~5 G  (peak at low-speed corners where mechanical grip dominates)
;
;   Road accel: ~1.0 G  (performance saloon / sports car, street tyres)
;   Road brake: ~1.2 G  (good OEM brakes on sport tyres)
;   Road lat:   ~1.2 G  (summer performance tyre, road surface)
;   Adjust upward for hypercars / track-prepared road cars.
[Variable]
name='Disp_F1_AccelG_v'
value=2.0

[Variable]
name='Disp_F1_BrakeG_v'
value=5.0

[Variable]
name='Disp_F1_LatG_v'
value=5.0

[Variable]
name='Disp_Road_AccelG_v'
value=1.0

[Variable]
name='Disp_Road_BrakeG_v'
value=1.2

[Variable]
name='Disp_Road_LatG_v'
value=1.2


; =============================================================================
; 9b — AXIS SCALES
; =============================================================================
; Slip chart: road peak * 3 places likely operating range in the lower third,
; leaving headroom for slides and wet conditions above.
; G charts: fixed at F1 * 1.1 — never rescale while driving.

[Variable]
name='Disp_Max_SA_v'
value=[context.Disp_SA_Road_v] * 3

[ExportProperty]
name='Disp_Max_SA'
value=[context.Disp_Max_SA_v]

[Variable]
