value=Min([context.Freq_RR_v] * [DataCorePlugin.ExternalScript.Rig_RR_HarmMult], [DataCorePlugin.ExternalScript.Rig_RR_FreqMax])

[ExportProperty]
name='HarmFreq_RR_2'
value=Min([context.Freq_RR_v] * Pow([DataCorePlugin.ExternalScript.Rig_RR_HarmMult], 2), [DataCorePlugin.ExternalScript.Rig_RR_FreqMax])

