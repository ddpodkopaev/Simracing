; WheelSlipTactile_ACE.ini
; SimHub NCalcScripts - Wheel Slip Tactile Model (Assetto Corsa EVO)
; Place in: C:\Program Files (x86)\SimHub\NCalcScripts\
;
; REQUIRES: RigConfig_BST.ini in the same folder (hardware frequency parameters)
;
; EXPORTED PROPERTIES - use in ShakeIt as [DataCorePlugin.ExternalScript.XXX]
; (abbreviation: [ES.XXX])
;
;   Per-wheel primary intensity (0-1.0) — use directly as [ES.PrimaryAmp_XX] * 100:
;     PrimaryAmp_FL  PrimaryAmp_FR  PrimaryAmp_RL  PrimaryAmp_RR
;
;   Per-wheel fundamental frequency (Hz):
;     Freq_FL  Freq_FR  (front, BST-2 range)
;     Freq_RL  Freq_RR  (rear,  BST-1 range)
;
;   Per-wheel pre-capped harmonic frequencies (Hz) — n=1,2,3:
;     HarmFreq_FL_1  HarmFreq_FL_2  HarmFreq_FL_3
;     HarmFreq_FR_1  HarmFreq_FR_2  HarmFreq_FR_3
;     HarmFreq_RL_1  HarmFreq_RL_2  HarmFreq_RL_3
;     HarmFreq_RR_1  HarmFreq_RR_2  HarmFreq_RR_3
;
;   Tunable mixing parameters (exported for reference/display):
;     LatMix_Front  LatMix_Rear
;
;   Display exports — Section 8 (three intuitive layers per chart):
;     TYRE POTENTIAL  Disp_Car_AccelG   Disp_Car_BrakeG   Disp_Car_LatG
;                     (pressure-derived capability ceiling, lerps Road↔F1 via TC_FL)
;     DRIVER INPUT    Disp_Throttle_Ga  Disp_Brake_Gb     Disp_Steer_Gl  Disp_SA_Gl
;                     (inputs scaled to Car_*G so full request = capability ceiling)
;     CAR OUTPUT      Disp_AccelG       Disp_BrakeG       Disp_LatG
;                     (raw G-force telemetry, sign-separated per chart)
;                     Disp_SR_Front     Disp_SR_Rear
;                     (per-axle live |slip ratio| — max of the two wheels)
;     AXIS SCALES     Disp_Max_AccelG   Disp_Max_BrakeG   Disp_Max_LatG  (fixed F1*1.1)
;                     Disp_Max_SA       Disp_Max_SR        (slip chart ceilings)
;     SA/SR REF LINES Disp_SA_F1/Road/Wet   Disp_SR_F1/Road/Wet
;
;   Diagnostics — FL full chain (prefix Diag_):
;     Diag_Raw_SA_FL  Diag_NormSA_FL  Diag_SAPeak_rad_FL  Diag_SRPeak_FL
;     Diag_Raw_SR_FL  Diag_NormSR_FL
;     Diag_Raw_Load_FL  Diag_LoadFL  Diag_Bell_FL
;     Diag_Raw_Press_FL  Diag_TC_FL  Diag_CompBlend_FL  Diag_LatScale_FL
;     Diag_Raw_Dirt_FL  Diag_Raw_Temp_FL  Diag_Raw_Wear_FL
;     Diag_DirtMod_FL  Diag_TempMod_FL  Diag_WearMod_FL  Diag_TyreMod_FL
;     Diag_CompFreqOff_FL  Diag_TempFreqOff_FL  Diag_FreqOff_FL
;     Diag_SpeedGate  Diag_SpeedNorm  Diag_SpeedHz
;     Diag_LA_FL_1_mult  Diag_LA_FL_2  Diag_LA_FL_3  Diag_LatAmp_FL_v
;     Diag_SA_FL_ex  Diag_SA_FL_dp  Diag_SA_FL_nm  Diag_SlideAmp_FL_v
;     Diag_LG_FL_1  Diag_LG_FL_2  Diag_LongAmp_FL_v
;     Diag_NormSA_FL_sc  Diag_SlipComp_FL
;
; CAR/SIM PARAMETERS: Section 0 below.
; RIG PARAMETERS:     RigConfig_BST.ini.
; RAW ALIASES:        Section 1 (remap wheel order or property names here).


; =============================================================================
; SHAKEIT CUSTOM EFFECT TEMPLATES
; Copy-paste directly into ShakeIt effect fields. [ES.] = DataCorePlugin.ExternalScript.
;
; All computation is pre-resolved inside this script. ShakeIt fields are trivial.
; Template shown for FL. Substitute FL→FR/RL/RR for other corners — no other changes.
;
; SimHub outputs one frequency per Custom Effect. Each harmonic = one duplicate effect
; with a different Frequency value. Suggested gain ladder: 100% / 65% / 42% / 27%.
; =============================================================================

; PRIMARY EFFECT — FL
;   Intensity : [ES.PrimaryAmp_FL] * 100
;   Frequency : [ES.Freq_FL]

; HARMONIC n=1 — FL  (duplicate effect, change Frequency only)
;   Intensity : [ES.PrimaryAmp_FL] * 65
;   Frequency : [ES.HarmFreq_FL_1]

; HARMONIC n=2 — FL
;   Intensity : [ES.PrimaryAmp_FL] * 42
;   Frequency : [ES.HarmFreq_FL_2]

; HARMONIC n=3 — FL
;   Intensity : [ES.PrimaryAmp_FL] * 27
;   Frequency : [ES.HarmFreq_FL_3]


; =============================================================================
; SECTION 0 - TUNABLE PARAMETERS
; Edit only this section.
; =============================================================================

; --- TYRE PHYSICS ---

; Peak tyre load in Newtons.
;   GT3/GT4 road cars:  ~4000-5000 N
;   Formula/LMP:        ~6000-8000 N
;   With new calculation, load anchor should be 3500 for all cars
[Variable]
name='LoadAnchor'
value=3500

; Slip angle and slip ratio at peak grip — compound-blended and pressure-interpolated
; per wheel in Section 0a. Two sets of bounds cover GT3/slick and road tyres.
;
; Compound is estimated from absolute tyre pressure (P_GT3_Max / P_Road_Min thresholds).
; Within each compound, TC (relative to P_Soft/P_Stiff) interpolates Soft↔Stiff bounds.
; The two compound lerps are then weighted against each other by CompBlend.
;
; Physical basis: higher pressure → stiffer carcass → peak reached at lower slip angle/ratio.
; Road compounds also sit higher than slicks at equivalent pressures (carcass construction).
;
; Calibrate using Diag_NormSA_FL_sc: should read ~1.0 at the hardest stable corner.
; Calibrate using Diag_NormSR_FL while braking hard to lockup threshold.

[Variable]
name='SAPeak_Soft_GT3'
value=4

[Variable]
name='SAPeak_Stiff_GT3'
value=2

[Variable]
name='SAPeak_Soft_Road'
value=6

[Variable]
name='SAPeak_Stiff_Road'
value=4

; Slip ratio bounds. Road tyres tolerate more longitudinal slip than slicks
; (softer carcass response, lower longitudinal stiffness per unit pressure).
[Variable]
name='SRPeak_Soft_GT3'
value=0.13

[Variable]
name='SRPeak_Stiff_GT3'
value=0.09

[Variable]
name='SRPeak_Soft_Road'
value=0.19

[Variable]
name='SRPeak_Stiff_Road'
value=0.13

; Compound identification thresholds (absolute pressure, bar).
;   P <= P_GT3_Max  → CompBlend = 0  (pure GT3/slick characteristics)
;   P >= P_Road_Min → CompBlend = 1  (pure road tyre characteristics)
;   between         → linear blend of both compound gradients
; Adjust only when changing tyre category entirely (e.g. moving from GT3 to GT4 cup).
[Variable]
name='P_GT3_Max'
value=2.0

[Variable]
name='P_Road_Min'
value=2.3

; --- TYRE COMPLIANCE (pressure-derived, per wheel) ---
; TyreCompliance = 1.0 at P_Soft (most progressive). 0.0 at P_Stiff (most rigid).
; Affects: LatAmp ceiling, SlideAmp saturation depth, frequency offset.
; Units: bar (AC EVO GameData layer reports bar).
;   Road/GT:    ~1.8-2.4 bar
;   Slick:      ~1.6-2.2 bar
[Variable]
name='P_Soft'
value=1.8

[Variable]
name='P_Stiff'
value=2.8

; Max Hz that tyre compliance shifts the operating frequency in either direction.
; High compliance (low pressure): -SWFreqRange Hz. Low compliance (high pressure): +SWFreqRange Hz.
[Variable]
name='SWFreqRange'
value=6

; --- TYRE CONDITION ---

; Optimal tyre core temperature for peak grip (deg C).
;   GT3 slick:     ~80-100 C
;   Road tyre:     ~60-80 C
[Variable]
name='TempOptimal'
value=85

; Degrees C from optimal at which amplitude reaches TempAmpFloor.
; Cold or hot by this much = minimum signal. Larger = more forgiving thermal window.
[Variable]
name='TempRange'
value=40

; Minimum amplitude scale when tyre is far outside optimal temperature window.
; 0.5 = cold/hot tyre still gives half the signal of an optimally-warmed tyre.
[Variable]
name='TempAmpFloor'
value=0.50

; Max Hz frequency shifts from temperature (applied with sign: cold=+, hot=-).
; Cold rubber is stiffer (higher resonance). Hot rubber softens (lower resonance).
; 2.0 Hz at TempRange deg C from optimal is subtle but perceptible.
[Variable]
name='TempFreqRange'
value=2.0

; Maximum amplitude loss from dirt/gravel on the tyre (0-1.0).
; 0.35 = fully dirty tyre gives 65% of clean-tyre signal.
; Dirty tyre is less communicative - grip state harder to feel precisely.
[Variable]
name='DirtAmpLoss'
value=0.35

; Minimum amplitude scale for a fully worn tyre.
; 0.70 = worn tyre gives 70% of new-tyre signal.
; Worn tyre also breaks away sooner (SlideAmp saturates faster).
; NOTE: AC EVO tyreWear is assumed 1.0=new, 0.0=worn. Verify in property browser.
[Variable]
name='WearAmpFloor'
value=0.70

; --- SIGNAL MIXING ---

; Lateral slip fraction in the ShakeIt INTENSITY formula.
; x = lateral (LatAmp) portion,  1-x = longitudinal (LongAmp) portion.
;
; This is a tyre-feel preference, not a hardware parameter — adjust per car class
; or driving style, not per rig. Hardware-specific parameters live in RigConfig_BST.ini.
;
;   0.40  full long bias — braking/traction dominant (formula/LMP feel)
;   0.55  slight lat bias — balanced GT3 / GT4 default
;   0.70  strong lat bias — rear-biased cars, oversteer-heavy sessions
;   1.00  lateral only

[Variable]
name='LatMix_Front_v'
value=0.55

[ExportProperty]
name='LatMix_Front'
value=[context.LatMix_Front_v]

[Variable]
name='LatMix_Rear_v'
value=0.70

[ExportProperty]
name='LatMix_Rear'
value=[context.LatMix_Rear_v]

; --- LOAD SENSITIVITY ---

; Minimum normalised wheel load. Applied as the floor in the Sqrt load curve
; (Section 2), so no wheel ever contributes less than this fraction of full amplitude.
;
; Raising this floor reduces the dynamic range of load across the axle —
; the inside wheel mid-corner becomes closer in amplitude to the outside wheel,
; making lateral feedback less load-sensitive and more consistently present.
;
; The Sqrt curve means a wheel at LoadAnchor * Floor^2 Newtons hits this floor.
; At LoadAnchor=3500 N:
;   Floor=0.40 → floor kicks in below  560 N  (very lightly loaded wheels only)
;   Floor=0.60 → floor kicks in below 1260 N  (inside wheel in a hard corner)
;   Floor=0.70 → floor kicks in below 1715 N  (moderate cornering loads)
;   Floor=0.80 → floor kicks in below 2240 N  (nearly always active)
;
; 0.60 is a good starting point: preserves noticeable load feel on weight transfer
; while keeping the inside wheel from being suppressed below useful amplitude.
[Variable]
name='LoadFloor'
value=0.60

; --- SLIDE CHARACTER ---

; Slide saturation depth - reference for a stiff, new, clean, optimal-temp tyre.
; Number of SAPeak multiples above the limit before SlideAmp fully saturates.
; Compliance, wear and other factors scale this automatically in Section 0a.
; 3.0 = saturates at 4x SAPeak (32 deg at SAPeak=8).
[Variable]
name='SlideDepth'
value=3.0

; --- SPEED ---

; Speed below which all signals fade to silence (km/h).
[Variable]
name='SpeedGateKmh'
value=15

; Reference speed for frequency pitch rise (km/h).
[Variable]
name='SpeedFreqRef'
value=200

; Max Hz that speed adds to frequency at SpeedFreqRef.
[Variable]
name='SpeedFreqRange'
value=8

; --- LAG COMPENSATION ---

; Onset lead factor. Scales NormSA and NormSR upward before they enter the amplitude
; and frequency pipelines, pre-advancing the signal onset to compensate for transducer
; chain lag (amp attack time, mechanical inertia, NCalc update rate, ShakeIt smoothing).
;
; Effect on each signal path:
;   LatAmp bell peak:   shifts from NormSA=1.0 to NormSA = 1/OnsetLead
;   SlideAmp onset:     begins at NormSA = 1/OnsetLead (same threshold as bell peak)
;   LongAmp:            rises faster — onset proportionally earlier
;   Frequency:          SlipComp rises sooner — pitch increases earlier
;
;   OnsetLead=1.00  no compensation — bell peaks exactly at grip limit
;   OnsetLead=1.15  bell peaks at NormSA≈0.87 — subtle pre-emphasis
;   OnsetLead=1.25  bell peaks at NormSA=0.80 — moderate, good starting point
;   OnsetLead=1.50  bell peaks at NormSA=0.67 — aggressive; slide onset well pre-limit
;
; Calibration: watch Diag_NormSA_FL while cornering at the edge of grip.
; Increase OnsetLead until the vibration peak coincides with your perceived limit.
;
; Rule of thumb for ~100 ms total lag (BST amp attack + mechanical inertia + NCalc latency):
;   OnsetLead ≈ 1 / (1 − lag_s × dNormSA/dt)
;   where dNormSA/dt is how fast slip angle ramps to the grip limit:
;     smooth entry   (0.8 s to limit, ~1.25 /s)  →  1 / (1 − 0.10×1.25) = 1.15
;     typical attack (0.5 s to limit, ~2.00 /s)  →  1 / (1 − 0.10×2.00) = 1.25  ← recommended
;     aggressive     (0.3 s to limit, ~3.33 /s)  →  1 / (1 − 0.10×3.33) = 1.50
;   For ~50 ms lag (fast amp, minimal smoothing): use ~1.10–1.15.
;   For ~150 ms lag (heavy ShakeIt smoothing):    use ~1.30–1.50.
;
; Start at 1.0 and increase on-track. Recommended first value: 1.25.
[Variable]
name='OnsetLead'
value=1.0


; =============================================================================
; SECTION 1 - RAW TELEMETRY ALIASES
; AC EVO shared memory order: 01=FL 02=FR 03=RL 04=RR
; If wheels feel swapped in-game, remap the 01-04 numbers here only.
; Tyre pressure uses SimHub GameData layer (position-explicit names, bar units).
; Dirt, temperature, wear use AC EVO raw shared memory.
; Verify property names in the SimHub property browser while in-game.
; =============================================================================

; --- SLIP ANGLE (radians in AC EVO) ---
; isnull fallback 0: if property throws or is absent, alias returns 0 (no slip).
[Variable]
name='Raw_SA_FL'
value=isnull([GameRawData.Physics.slipAngle01], 0.0)

[Variable]
name='Raw_SA_FR'
value=isnull([GameRawData.Physics.slipAngle02], 0.0)

[Variable]
name='Raw_SA_RL'
value=isnull([GameRawData.Physics.slipAngle03], 0.0)

[Variable]
name='Raw_SA_RR'
value=isnull([GameRawData.Physics.slipAngle04], 0.0)

; --- SLIP RATIO (dimensionless) ---
[Variable]
name='Raw_SR_FL'
value=isnull([GameRawData.Physics.slipRatio01], 0.0)

[Variable]
name='Raw_SR_FR'
value=isnull([GameRawData.Physics.slipRatio02], 0.0)

[Variable]
name='Raw_SR_RL'
value=isnull([GameRawData.Physics.slipRatio03], 0.0)

[Variable]
name='Raw_SR_RR'
value=isnull([GameRawData.Physics.slipRatio04], 0.0)

; --- WHEEL LOAD (Newtons) ---
[Variable]
name='Raw_Load_FL'
value=[GameRawData.Physics.wheelLoad01]

[Variable]
name='Raw_Load_FR'
value=[GameRawData.Physics.wheelLoad02]

[Variable]
name='Raw_Load_RL'
value=[GameRawData.Physics.wheelLoad03]

[Variable]
name='Raw_Load_RR'
value=[GameRawData.Physics.wheelLoad04]

; --- TYRE PRESSURE (bar, SimHub GameData layer) ---
; Fallback 2.1 bar when game not running -> mid-range compliance (TC ~0.35).
[Variable]
name='Raw_Press_FL'
value=isnull([DataCorePlugin.GameData.NewData.TyrePressureFrontLeft], 2.1)

[Variable]
name='Raw_Press_FR'
value=isnull([DataCorePlugin.GameData.NewData.TyrePressureFrontRight], 2.1)

[Variable]
name='Raw_Press_RL'
value=isnull([DataCorePlugin.GameData.NewData.TyrePressureRearLeft], 2.1)

[Variable]
name='Raw_Press_RR'
value=isnull([DataCorePlugin.GameData.NewData.TyrePressureRearRight], 2.1)

; --- TYRE DIRT LEVEL (0=clean, 1=fully dirty) ---
; Fallback 0 (clean) when game not running.
[Variable]
name='Raw_Dirt_FL'
value=isnull([GameRawData.Physics.tyreDirtyLevel01], 0.0)

[Variable]
name='Raw_Dirt_FR'
value=isnull([GameRawData.Physics.tyreDirtyLevel02], 0.0)

[Variable]
name='Raw_Dirt_RL'
value=isnull([GameRawData.Physics.tyreDirtyLevel03], 0.0)

[Variable]
name='Raw_Dirt_RR'
value=isnull([GameRawData.Physics.tyreDirtyLevel04], 0.0)

; --- TYRE CORE TEMPERATURE (deg C) ---
; Fallback TempOptimal (85 C) when game not running - no thermal penalty at idle.
; Property name: verify in browser. May be tyreCoreTemperature or tyreTemp.
[Variable]
name='Raw_Temp_FL'
value=isnull([GameRawData.Physics.tyreCoreTemperature01], 85)

[Variable]
name='Raw_Temp_FR'
value=isnull([GameRawData.Physics.tyreCoreTemperature02], 85)

[Variable]
name='Raw_Temp_RL'
value=isnull([GameRawData.Physics.tyreCoreTemperature03], 85)

[Variable]
name='Raw_Temp_RR'
value=isnull([GameRawData.Physics.tyreCoreTemperature04], 85)

; --- TYRE WEAR (1.0=new, 0.0=fully worn) ---
; Fallback 1.0 (new) when game not running - no wear penalty at idle.
; Verify direction in property browser: if values go 0->1 during race, invert below.
[Variable]
name='Raw_Wear_FL'
value=isnull([GameRawData.Physics.tyreWear01], 1.0)

[Variable]
name='Raw_Wear_FR'
value=isnull([GameRawData.Physics.tyreWear02], 1.0)

[Variable]
name='Raw_Wear_RL'
value=isnull([GameRawData.Physics.tyreWear03], 1.0)

[Variable]
name='Raw_Wear_RR'
value=isnull([GameRawData.Physics.tyreWear04], 1.0)


; =============================================================================
; SECTION 0a - DERIVED CONSTANTS
; Computed from Section 0 params and Section 1 raw aliases. Do not edit.
; =============================================================================

; --- SPEED ---

[Variable]
name='SpeedKmh'
value=isnull([DataCorePlugin.GameData.NewData.SpeedKmh], 0.0)

; Smooth gate: 0 at standstill, 1 at SpeedGateKmh. Multiplied into all amplitudes.
[Variable]
name='SpeedGate'
value=Min(Max(([context.SpeedKmh] +0.0) / ([context.SpeedGateKmh]+ 0.0), 0.0), 1.0)

[Variable]
name='SpeedNorm'
value=Min([context.SpeedKmh] / [context.SpeedFreqRef], 1.0)

; Sub-linear speed-to-frequency contribution. Rises quickly then flattens.
[Variable]
name='SpeedHz'
value=Pow([context.SpeedNorm], 0.7) * [context.SpeedFreqRange]

; --- TYRE COMPLIANCE (from pressure, per wheel) ---
; TC=1.0 at P_Soft (most compliant). TC=0.0 at P_Stiff (most rigid).
; Affects LatAmp ceiling, SlideAmp saturation depth, and operating frequency.

[Variable]
name='TC_FL'
value=1 - Min(Max(([context.Raw_Press_FL] - [context.P_Soft]) / ([context.P_Stiff] - [context.P_Soft]), 0.0), 1.0)

[Variable]
name='TC_FR'
value=1 - Min(Max(([context.Raw_Press_FR] - [context.P_Soft]) / ([context.P_Stiff] - [context.P_Soft]), 0.0), 1.0)

[Variable]
name='TC_RL'
value=1 - Min(Max(([context.Raw_Press_RL] - [context.P_Soft]) / ([context.P_Stiff] - [context.P_Soft]), 0.0), 1.0)

[Variable]
name='TC_RR'
value=1 - Min(Max(([context.Raw_Press_RR] - [context.P_Soft]) / ([context.P_Stiff] - [context.P_Soft]), 0.0), 1.0)

; --- COMPOUND BLEND + PRESSURE-DERIVED SLIP PEAKS (per wheel) ---
; Two independent pressure dimensions:
;   CompBlend (absolute pressure) identifies compound: 0=GT3/slick, 1=road.
;   TC (relative to P_Soft/P_Stiff) gives within-compound Soft↔Stiff variation.
; Final peak = lerp(GT3_lerp_on_TC, Road_lerp_on_TC, CompBlend).

[Variable]
name='CompBlend_FL'
value=Min(Max(([context.Raw_Press_FL] - [context.P_GT3_Max]) / ([context.P_Road_Min] - [context.P_GT3_Max]), 0.0), 1.0)

[Variable]
name='CompBlend_FR'
value=Min(Max(([context.Raw_Press_FR] - [context.P_GT3_Max]) / ([context.P_Road_Min] - [context.P_GT3_Max]), 0.0), 1.0)

[Variable]
name='CompBlend_RL'
value=Min(Max(([context.Raw_Press_RL] - [context.P_GT3_Max]) / ([context.P_Road_Min] - [context.P_GT3_Max]), 0.0), 1.0)

[Variable]
name='CompBlend_RR'
value=Min(Max(([context.Raw_Press_RR] - [context.P_GT3_Max]) / ([context.P_Road_Min] - [context.P_GT3_Max]), 0.0), 1.0)

[Variable]
name='SAPeak_rad_FL'
value=(([context.SAPeak_Stiff_GT3] + ([context.SAPeak_Soft_GT3] - [context.SAPeak_Stiff_GT3]) * [context.TC_FL]) * (1.0 - [context.CompBlend_FL]) + ([context.SAPeak_Stiff_Road] + ([context.SAPeak_Soft_Road] - [context.SAPeak_Stiff_Road]) * [context.TC_FL]) * [context.CompBlend_FL]) * 0.01745329

[Variable]
name='SAPeak_rad_FR'
value=(([context.SAPeak_Stiff_GT3] + ([context.SAPeak_Soft_GT3] - [context.SAPeak_Stiff_GT3]) * [context.TC_FR]) * (1.0 - [context.CompBlend_FR]) + ([context.SAPeak_Stiff_Road] + ([context.SAPeak_Soft_Road] - [context.SAPeak_Stiff_Road]) * [context.TC_FR]) * [context.CompBlend_FR]) * 0.01745329

[Variable]
name='SAPeak_rad_RL'
value=(([context.SAPeak_Stiff_GT3] + ([context.SAPeak_Soft_GT3] - [context.SAPeak_Stiff_GT3]) * [context.TC_RL]) * (1.0 - [context.CompBlend_RL]) + ([context.SAPeak_Stiff_Road] + ([context.SAPeak_Soft_Road] - [context.SAPeak_Stiff_Road]) * [context.TC_RL]) * [context.CompBlend_RL]) * 0.01745329

[Variable]
name='SAPeak_rad_RR'
value=(([context.SAPeak_Stiff_GT3] + ([context.SAPeak_Soft_GT3] - [context.SAPeak_Stiff_GT3]) * [context.TC_RR]) * (1.0 - [context.CompBlend_RR]) + ([context.SAPeak_Stiff_Road] + ([context.SAPeak_Soft_Road] - [context.SAPeak_Stiff_Road]) * [context.TC_RR]) * [context.CompBlend_RR]) * 0.01745329

[Variable]
name='SRPeak_FL'
value=([context.SRPeak_Stiff_GT3] + ([context.SRPeak_Soft_GT3] - [context.SRPeak_Stiff_GT3]) * [context.TC_FL]) * (1.0 - [context.CompBlend_FL]) + ([context.SRPeak_Stiff_Road] + ([context.SRPeak_Soft_Road] - [context.SRPeak_Stiff_Road]) * [context.TC_FL]) * [context.CompBlend_FL]

[Variable]
name='SRPeak_FR'
value=([context.SRPeak_Stiff_GT3] + ([context.SRPeak_Soft_GT3] - [context.SRPeak_Stiff_GT3]) * [context.TC_FR]) * (1.0 - [context.CompBlend_FR]) + ([context.SRPeak_Stiff_Road] + ([context.SRPeak_Soft_Road] - [context.SRPeak_Stiff_Road]) * [context.TC_FR]) * [context.CompBlend_FR]

[Variable]
name='SRPeak_RL'
value=([context.SRPeak_Stiff_GT3] + ([context.SRPeak_Soft_GT3] - [context.SRPeak_Stiff_GT3]) * [context.TC_RL]) * (1.0 - [context.CompBlend_RL]) + ([context.SRPeak_Stiff_Road] + ([context.SRPeak_Soft_Road] - [context.SRPeak_Stiff_Road]) * [context.TC_RL]) * [context.CompBlend_RL]

[Variable]
name='SRPeak_RR'
value=([context.SRPeak_Stiff_GT3] + ([context.SRPeak_Soft_GT3] - [context.SRPeak_Stiff_GT3]) * [context.TC_RR]) * (1.0 - [context.CompBlend_RR]) + ([context.SRPeak_Stiff_Road] + ([context.SRPeak_Soft_Road] - [context.SRPeak_Stiff_Road]) * [context.TC_RR]) * [context.CompBlend_RR]

; --- TYRE CONDITION MODIFIERS (per wheel) ---

; DirtMod: amplitude scale from dirt. 1.0=clean, (1-DirtAmpLoss)=fully dirty.
; Clamped to [0,1]: if tyreDirtyLevel returns out-of-range values, DirtMod stays safe.
[Variable]
name='DirtMod_FL'
value=Min(Max(1.0 - isnull([context.Raw_Dirt_FL], 0.0) * [context.DirtAmpLoss], 0.0), 1.0)

[Variable]
name='DirtMod_FR'
value=Min(Max(1.0 - isnull([context.Raw_Dirt_FR], 0.0) * [context.DirtAmpLoss], 0.0), 1.0)

[Variable]
name='DirtMod_RL'
value=Min(Max(1.0 - isnull([context.Raw_Dirt_RL], 0.0) * [context.DirtAmpLoss], 0.0), 1.0)

[Variable]
name='DirtMod_RR'
value=Min(Max(1.0 - isnull([context.Raw_Dirt_RR], 0.0) * [context.DirtAmpLoss], 0.0), 1.0)

; TempMod: amplitude scale from temperature. 1.0 at TempOptimal, TempAmpFloor outside window.
; Formula: TempAmpFloor + (1-TempAmpFloor) * clamp(1 - |T-TempOptimal|/TempRange, 0, 1.0)
; isnull fallback is TempOptimal so a missing property gives TempMod=1.0 (no penalty).
[Variable]
name='TempMod_FL'
value=[context.TempAmpFloor] + (1 - [context.TempAmpFloor]) * Max(1 - Abs(isnull([context.Raw_Temp_FL], [context.TempOptimal]) - [context.TempOptimal]) / [context.TempRange], 0.0)

[Variable]
name='TempMod_FR'
value=[context.TempAmpFloor] + (1 - [context.TempAmpFloor]) * Max(1 - Abs(isnull([context.Raw_Temp_FR], [context.TempOptimal]) - [context.TempOptimal]) / [context.TempRange], 0.0)

[Variable]
name='TempMod_RL'
value=[context.TempAmpFloor] + (1 - [context.TempAmpFloor]) * Max(1 - Abs(isnull([context.Raw_Temp_RL], [context.TempOptimal]) - [context.TempOptimal]) / [context.TempRange], 0.0)

[Variable]
name='TempMod_RR'
value=[context.TempAmpFloor] + (1 - [context.TempAmpFloor]) * Max(1 - Abs(isnull([context.Raw_Temp_RR], [context.TempOptimal]) - [context.TempOptimal]) / [context.TempRange], 0.0)

; WearMod: amplitude scale from wear. 1.0=new tyre, WearAmpFloor=fully worn.
; Also used to tighten SlideDepth: worn tyre breaks away sooner.
; isnull fallback is 1 so a missing property gives WearMod=1.0 (no penalty).
[Variable]
name='WearMod_FL'
value=[context.WearAmpFloor] + (1 - [context.WearAmpFloor]) * isnull([context.Raw_Wear_FL], 1.0)

[Variable]
name='WearMod_FR'
value=[context.WearAmpFloor] + (1 - [context.WearAmpFloor]) * isnull([context.Raw_Wear_FR], 1.0)

[Variable]
name='WearMod_RL'
value=[context.WearAmpFloor] + (1 - [context.WearAmpFloor]) * isnull([context.Raw_Wear_RL], 1.0)

[Variable]
name='WearMod_RR'
value=[context.WearAmpFloor] + (1 - [context.WearAmpFloor]) * isnull([context.Raw_Wear_RR], 1.0)

; TyreMod: combined amplitude modifier (dirt * temp * wear).
; Each component wrapped in isnull so a failed raw property defaults to 1.0 (neutral)
; rather than propagating null and zeroing out LatAmp/LongAmp.
; Applied to LatAmp and LongAmp. NOT applied to SlideAmp (chaos is chaos).
; Worst-case floor: TempAmpFloor * (1-DirtAmpLoss) * WearAmpFloor = 0.5*0.65*0.70 = ~0.23
[Variable]
name='TyreMod_FL'
value=isnull([context.DirtMod_FL], 1.0) * isnull([context.TempMod_FL], 1.0) * isnull([context.WearMod_FL], 1.0)

[Variable]
name='TyreMod_FR'
value=isnull([context.DirtMod_FR], 1.0) * isnull([context.TempMod_FR], 1.0) * isnull([context.WearMod_FR], 1.0)

[Variable]
name='TyreMod_RL'
value=isnull([context.DirtMod_RL], 1.0) * isnull([context.TempMod_RL], 1.0) * isnull([context.WearMod_RL], 1.0)

[Variable]
name='TyreMod_RR'
value=isnull([context.DirtMod_RR], 1.0) * isnull([context.TempMod_RR], 1.0) * isnull([context.WearMod_RR], 1.0)

; DIAGNOSTICS - TyreMod and TC (defined here; NormSA diagnostics below Section 3).
; TyreMod should be ~0.23-1.0 while driving. If 0 or NULL, a condition property failed.
; TC_FL should be ~0.3-0.8 depending on tyre pressure. If NULL, pressure lookup is broken.
[ExportProperty]
name='Diag_TyreMod_FL'
value=[context.TyreMod_FL]

[ExportProperty]
name='Diag_TC_FL'
value=[context.TC_FL]

; --- FREQUENCY OFFSETS (per wheel) ---

; Compliance frequency offset: (0.5 - TC) * 2 * SWFreqRange
;   TC=0 (stiff/high pressure): +SWFreqRange Hz
;   TC=0.5 (mid):                0 Hz
;   TC=1 (compliant/low press): -SWFreqRange Hz
[Variable]
name='CompFreqOff_FL'
value=(0.5 - [context.TC_FL]) * 2 * [context.SWFreqRange]

[Variable]
name='CompFreqOff_FR'
value=(0.5 - [context.TC_FR]) * 2 * [context.SWFreqRange]

[Variable]
name='CompFreqOff_RL'
value=(0.5 - [context.TC_RL]) * 2 * [context.SWFreqRange]

[Variable]
name='CompFreqOff_RR'
value=(0.5 - [context.TC_RR]) * 2 * [context.SWFreqRange]

; Temperature frequency offset: signed, proportional to deviation from TempOptimal.
; Cold (T < TempOptimal): positive offset (stiffer rubber, higher resonance).
; Hot  (T > TempOptimal): negative offset (softer rubber, lower resonance).
; Clamped to +/-TempFreqRange Hz.
[Variable]
name='TempFreqOff_FL'
value=Max(Min(([context.TempOptimal] - [context.Raw_Temp_FL]) / [context.TempRange] * [context.TempFreqRange], [context.TempFreqRange]), -[context.TempFreqRange])

[Variable]
name='TempFreqOff_FR'
value=Max(Min(([context.TempOptimal] - [context.Raw_Temp_FR]) / [context.TempRange] * [context.TempFreqRange], [context.TempFreqRange]), -[context.TempFreqRange])

[Variable]
name='TempFreqOff_RL'
value=Max(Min(([context.TempOptimal] - [context.Raw_Temp_RL]) / [context.TempRange] * [context.TempFreqRange], [context.TempFreqRange]), -[context.TempFreqRange])

[Variable]
name='TempFreqOff_RR'
value=Max(Min(([context.TempOptimal] - [context.Raw_Temp_RR]) / [context.TempRange] * [context.TempFreqRange], [context.TempFreqRange]), -[context.TempFreqRange])

; Combined frequency offset per wheel and axle (compliance + temperature).
[Variable]
name='FreqOff_FL'
value=[context.CompFreqOff_FL] + [context.TempFreqOff_FL]

[Variable]
name='FreqOff_FR'
value=[context.CompFreqOff_FR] + [context.TempFreqOff_FR]

[Variable]
name='FreqOff_RL'
value=[context.CompFreqOff_RL] + [context.TempFreqOff_RL]

[Variable]
name='FreqOff_RR'
value=[context.CompFreqOff_RR] + [context.TempFreqOff_RR]


; =============================================================================
; SECTION 2 - LOAD NORMALISATION
; =============================================================================
; Normalised 0-1 against LoadAnchor. Floor at LoadFloor (Section 0) keeps the
; inside wheel from being suppressed below useful amplitude mid-corner.

[Variable]
name='LoadFL'
value=Min(Max(Sqrt((isnull([context.Raw_Load_FL],0) + 0.0) / ([context.LoadAnchor] + 0.0)), [context.LoadFloor]), 1.0)

[Variable]
name='LoadFR'
value=Min(Max(Sqrt((isnull([context.Raw_Load_FR],0) + 0.0) / ([context.LoadAnchor] + 0.0)), [context.LoadFloor]), 1.0)

[Variable]
name='LoadRL'
value=Min(Max(Sqrt((isnull([context.Raw_Load_RL],0) + 0.0) / ([context.LoadAnchor] + 0.0)), [context.LoadFloor]), 1.0)

[Variable]
name='LoadRR'
value=Min(Max(Sqrt((isnull([context.Raw_Load_RR],0) + 0.0) / ([context.LoadAnchor] + 0.0)), [context.LoadFloor]), 1.0)

; =============================================================================
; SECTION 3 - SLIP NORMALISATION
; =============================================================================
; NormSA: unclamped. 1.0=at grip limit. >1.0=sliding.
; NormSR: clamped at 1.4 (full lockup/wheelspin ceiling).

[Variable]
name='NormSA_FL'
value=Abs([context.Raw_SA_FL]) / [context.SAPeak_rad_FL]

[Variable]
name='NormSA_FR'
value=Abs([context.Raw_SA_FR]) / [context.SAPeak_rad_FR]

[Variable]
name='NormSA_RL'
value=Abs([context.Raw_SA_RL]) / [context.SAPeak_rad_RL]

[Variable]
name='NormSA_RR'
value=Abs([context.Raw_SA_RR]) / [context.SAPeak_rad_RR]

[Variable]
name='NormSR_FL'
value=Min(Abs([context.Raw_SR_FL]) / [context.SRPeak_FL], 1.4)

[Variable]
name='NormSR_FR'
value=Min(Abs([context.Raw_SR_FR]) / [context.SRPeak_FR], 1.4)

[Variable]
name='NormSR_RL'
value=Min(Abs([context.Raw_SR_RL]) / [context.SRPeak_RL], 1.4)

[Variable]
name='NormSR_RR'
value=Min(Abs([context.Raw_SR_RR]) / [context.SRPeak_RR], 1.4)


; =============================================================================
; SECTION 3a - ONSET LEAD SCALING
; =============================================================================
; Scaled variants of NormSA/NormSR used by all downstream amplitude and frequency
; computations. Raw NormSA/NormSR remain available for diagnostics (Section 7).
; OnsetLead=1.0 leaves behaviour identical to unscaled. Increase to pre-advance onset.

[Variable]
name='NormSA_FL_sc'
value=[context.NormSA_FL] * [context.OnsetLead]

[Variable]
name='NormSA_FR_sc'
value=[context.NormSA_FR] * [context.OnsetLead]

[Variable]
name='NormSA_RL_sc'
value=[context.NormSA_RL] * [context.OnsetLead]

[Variable]
name='NormSA_RR_sc'
value=[context.NormSA_RR] * [context.OnsetLead]

[Variable]
name='NormSR_FL_sc'
value=[context.NormSR_FL] * [context.OnsetLead]

[Variable]
name='NormSR_FR_sc'
value=[context.NormSR_FR] * [context.OnsetLead]

[Variable]
name='NormSR_RL_sc'
value=[context.NormSR_RL] * [context.OnsetLead]

[Variable]
name='NormSR_RR_sc'
value=[context.NormSR_RR] * [context.OnsetLead]


; =============================================================================
; DIAGNOSTICS - LATERAL SIGNAL (check in property browser while cornering at speed)
; =============================================================================
; Diag_Raw_SA_FL: direct read of the raw slip angle property.
;   Reads -99 when game not running or property missing (null sentinel).
;   Reads 0.000 while cornering -> property exists but is reporting zero.
;   Reads non-zero (e.g. 0.05-0.15 rad) while cornering -> telemetry is live.
[ExportProperty]
name='Diag_Raw_SA_FL'
value=isnull([GameRawData.Physics.slipAngle01], -99)

; Diag_NormSA_FL: normalised slip angle at FL wheel (0=no slip, 1=grip limit, >1=sliding).
;   Should read ~0.3-1.0+ mid-corner. If 0 while Diag_Raw_SA_FL is non-zero,
;   check Diag_SAPeak_rad_FL (pressure-derived; expected ~0.052-0.087 rad for 3-5 deg).
[ExportProperty]
name='Diag_NormSA_FL'
value=[context.NormSA_FL]

; --- LATAMP COMPONENT VARIABLES ---
; Bell curve per wheel, pre-clamped to [0,1]. Avoids passing negatives into product chain.
; LatScale: compliance amplitude effect. TC=1 (soft/low-pressure) -> LatScale=0.65.

[Variable]
name='Bell_FL'
value=Min(Max(2 * [context.NormSA_FL_sc] * (1 - [context.NormSA_FL_sc] * 0.5), 0.0), 1.0)

[Variable]
name='Bell_FR'
value=Min(Max(2 * [context.NormSA_FR_sc] * (1 - [context.NormSA_FR_sc] * 0.5), 0.0), 1.0)

[Variable]
name='Bell_RL'
value=Min(Max(2 * [context.NormSA_RL_sc] * (1 - [context.NormSA_RL_sc] * 0.5), 0.0), 1.0)

[Variable]
name='Bell_RR'
value=Min(Max(2 * [context.NormSA_RR_sc] * (1 - [context.NormSA_RR_sc] * 0.5), 0.0), 1.0)

[Variable]
name='LatScale_FL'
value=1.0 - [context.TC_FL] * 0.35

[Variable]
name='LatScale_FR'
value=1.0 - [context.TC_FR] * 0.35

[Variable]
name='LatScale_RL'
value=1.0 - [context.TC_RL] * 0.35

[Variable]
name='LatScale_RR'
value=1.0 - [context.TC_RR] * 0.35

; Diagnostic exports - one per direct multiplier feeding LatAmp_FL.
; If LatAmp_FL is NULL, find the NULL here. All should read non-null while driving.
;   Diag_Bell_FL:    0 at standstill or slide, peaks at NormSA = 1/OnsetLead (pre-advanced).
;   Diag_LoadFL:     0.4-1.0 always (floor enforced).
;   Diag_SpeedGate:  0 at rest, 1 above SpeedGateKmh (15 km/h).
;   Diag_LatScale_FL: 0.65 when TC=1 (soft tyre). 1.0 when TC=0 (stiff tyre).

[ExportProperty]
name='Diag_LA_FL_1_mult'
value=([context.Bell_FL] + 0.0) * ([context.LoadFL] + 0.0)

[ExportProperty]
name='Diag_LA_FL_2'
value=[context.LA_FL_1] * [context.SpeedGate]

[ExportProperty]
name='Diag_LA_FL_3'
value=[context.LA_FL_2] * [context.LatScale_FL]

[ExportProperty]
name='Diag_LatAmp_FL_v'
value=Min([context.LA_FL_3] * [context.TyreMod_FL], 1.0)

[ExportProperty]
name='Diag_LoadFL'
value=[context.LoadFL]

[ExportProperty]
name='Diag_LoadFL_Mul'
value=[context.LoadFL] * 1.0

[ExportProperty]
name='Diag_SAPeak_rad_FL'
value=[context.SAPeak_rad_FL]

[ExportProperty]
name='Diag_SRPeak_FL'
value=[context.SRPeak_FL]

[ExportProperty]
name='Diag_CompBlend_FL'
value=[context.CompBlend_FL]

[ExportProperty]
name='Diag_Bell_FL'
value=[context.Bell_FL]

[ExportProperty]
name='Diag_SpeedGate'
value=[context.SpeedGate]

[ExportProperty]
name='Diag_LatScale_FL'
value=[context.LatScale_FL]

[ExportProperty]
name='Diag_BellPlusLoad'
value=[context.Bell_FL] + [context.LoadFL]

; =============================================================================
; SECTION 4 - LATERAL AMPLITUDE
; =============================================================================
; Shape: Bell_FL = 2*NormSA*(1-NormSA*0.5), clamped [0,1].
;   NormSA=0.0: 0.00  NormSA=0.5: 0.75  NormSA=1.0: 1.00 (peak AT limit)
;   NormSA=1.5: 0.75  NormSA=2.0: 0.00  (fades - SlideAmp takes over past here)
;
; ARCHITECTURE NOTE: all per-wheel values are computed as [Variable] first.
; ExportProperties only read from Variables - no ExportProperty references another
; ExportProperty via [context.*] in this script. That pattern causes evaluation cycles
; in SimHub's NCalcScript engine, resulting in NULL outputs.

; LatAmp chained - each Min/Max sees at most one multiplication.
[Variable]
name='LA_FL_1'
value=([context.Bell_FL] + 0.0) * ([context.LoadFL] + 0.0)

[Variable]
name='LA_FL_2'
value=[context.LA_FL_1]  * [context.SpeedGate]

[Variable]
name='LA_FL_3'
value=[context.LA_FL_2] * [context.LatScale_FL]

[Variable]
name='LatAmp_FL_v'
value=Min([context.LA_FL_3] * [context.TyreMod_FL], 1.0)

[Variable]
name='LA_FR_1'
value=([context.Bell_FR] + 0.0) * ([context.LoadFR] + 0.0)

[Variable]
name='LA_FR_2'
value=[context.LA_FR_1] * [context.SpeedGate]

[Variable]
name='LA_FR_3'
value=[context.LA_FR_2] * [context.LatScale_FR]

[Variable]
name='LatAmp_FR_v'
value=Min([context.LA_FR_3] * [context.TyreMod_FR], 1.0)

; NOTE: Bug fix — original used Bell_LR and LoadLR (undefined). Corrected to Bell_RL / LoadRL.
[Variable]
name='LA_RL_1'
value=([context.Bell_RL] + 0.0) * ([context.LoadRL] + 0.0)

[Variable]
name='LA_RL_2'
value=[context.LA_RL_1] * [context.SpeedGate]

[Variable]
name='LA_RL_3'
value=[context.LA_RL_2] * [context.LatScale_RL]

[Variable]
name='LatAmp_RL_v'
value=Min([context.LA_RL_3] * [context.TyreMod_RL], 1.0)

[Variable]
name='LA_RR_1'
value=([context.Bell_RR] + 0.0) * ([context.LoadRR] + 0.0)

[Variable]
name='LA_RR_2'
value=[context.LA_RR_1] * [context.SpeedGate]

[Variable]
name='LA_RR_3'
value=[context.LA_RR_2] * [context.LatScale_RR]

[Variable]
name='LatAmp_RR_v'
value=Min([context.LA_RR_3] * [context.TyreMod_RR], 1.0)


; =============================================================================
; SECTION 4a - SLIDE RESIDUAL AMPLITUDE
; =============================================================================
; Zero within the grip limit (NormSA<=1.0). Ramps up past the limit.
; Frequency naturally at ceiling when sliding (SlipComposite saturated at 1.5).
;
; Effective slide depth = SlideDepth * ComplianceStretch * WearMod
;   ComplianceStretch: (1 + TC*2.5) - soft tyre (high TC) slides over more degrees
;   WearMod:           worn tyre breaks away sooner (lower depth = faster saturation)
;
; TyreMod NOT applied to amplitude: chaotic slide is not attenuated by dirt or temp.
; WearMod IS applied via depth: worn tyre slides sooner, reaching full amplitude earlier.

; SlideAmp chained - excess, depth, and clamped norm computed separately.
[Variable]
name='SA_FL_ex'
value=Max([context.NormSA_FL_sc] - 1, 0.0)

[Variable]
name='SA_FL_dp'
value=[context.SlideDepth] * (1 + [context.TC_FL] * 2.5) * [context.WearMod_FL]

[Variable]
name='SA_FL_nm'
value=Min([context.SA_FL_ex] / [context.SA_FL_dp], 1.0)

[Variable]
name='SlideAmp_FL_v'
value=[context.SA_FL_nm] * [context.LoadFL] * [context.SpeedGate]

[Variable]
name='SA_FR_ex'
value=Max([context.NormSA_FR_sc] - 1, 0.0)

[Variable]
name='SA_FR_dp'
value=[context.SlideDepth] * (1 + [context.TC_FR] * 2.5) * [context.WearMod_FR]

[Variable]
name='SA_FR_nm'
value=Min([context.SA_FR_ex] / [context.SA_FR_dp], 1.0)

[Variable]
name='SlideAmp_FR_v'
value=[context.SA_FR_nm] * [context.LoadFR] * [context.SpeedGate]

[Variable]
name='SA_RL_ex'
value=Max([context.NormSA_RL_sc] - 1, 0.0)

[Variable]
name='SA_RL_dp'
value=[context.SlideDepth] * (1 + [context.TC_RL] * 2.5) * [context.WearMod_RL]

[Variable]
name='SA_RL_nm'
value=Min([context.SA_RL_ex] / [context.SA_RL_dp], 1.0)

[Variable]
name='SlideAmp_RL_v'
value=[context.SA_RL_nm] * [context.LoadRL] * [context.SpeedGate]

[Variable]
name='SA_RR_ex'
value=Max([context.NormSA_RR_sc] - 1, 0.0)

[Variable]
name='SA_RR_dp'
value=[context.SlideDepth] * (1 + [context.TC_RR] * 2.5) * [context.WearMod_RR]

[Variable]
name='SA_RR_nm'
value=Min([context.SA_RR_ex] / [context.SA_RR_dp], 1.0)

[Variable]
name='SlideAmp_RR_v'
value=[context.SA_RR_nm] * [context.LoadRR] * [context.SpeedGate]


; =============================================================================
; SECTION 5 - LONGITUDINAL AMPLITUDE
; =============================================================================
; Pow(NormSR, 1.5): near-silent under moderate braking, strong near lockup/wheelspin.
; TyreMod applied: dirty/cold/worn tyre gives softer longitudinal feedback.
; Compliance NOT applied: longitudinal threshold is wheel rotation physics,
; not sidewall flex - tyre pressure has negligible effect on SR onset feel.

; LongAmp chained - Pow result multiplied step by step before clamping.
[Variable]
name='LG_FL_1'
value=Pow([context.NormSR_FL_sc], 1.5) * [context.LoadFL]

[Variable]
name='LG_FL_2'
value=[context.LG_FL_1] * [context.SpeedGate]

[Variable]
name='LongAmp_FL_v'
value=Min(Max([context.LG_FL_2] * [context.TyreMod_FL], 0.0), 1.0)

[Variable]
name='LG_FR_1'
value=Pow([context.NormSR_FR_sc], 1.5) * [context.LoadFR]

[Variable]
name='LG_FR_2'
value=[context.LG_FR_1] * [context.SpeedGate]

[Variable]
name='LongAmp_FR_v'
value=Min(Max([context.LG_FR_2] * [context.TyreMod_FR], 0.0), 1.0)

[Variable]
name='LG_RL_1'
value=Pow([context.NormSR_RL_sc], 1.5) * [context.LoadRL]

[Variable]
name='LG_RL_2'
value=[context.LG_RL_1] * [context.SpeedGate]

[Variable]
name='LongAmp_RL_v'
value=Min(Max([context.LG_RL_2] * [context.TyreMod_RL], 0.0), 1.0)

[Variable]
name='LG_RR_1'
value=Pow([context.NormSR_RR_sc], 1.5) * [context.LoadRR]

[Variable]
name='LG_RR_2'
value=[context.LG_RR_1] * [context.SpeedGate]

[Variable]
name='LongAmp_RR_v'
value=Min(Max([context.LG_RR_2] * [context.TyreMod_RR], 0.0), 1.0)


; =============================================================================
; SECTION 6 - PRIMARY AMPLITUDE (lat/long mix applied)
; =============================================================================
; PrimaryAmp = the final per-wheel intensity value exported to ShakeIt.
; Computed here because both LatAmp_*_v (Section 4) and LongAmp_*_v (Section 5)
; are now available. Uses LatMix_Front_v / LatMix_Rear_v from Section 0.

[Variable]
name='PrimaryAmp_FL_v'
value=[context.LatAmp_FL_v] * [context.LatMix_Front_v] + [context.LongAmp_FL_v] * (1.0 - [context.LatMix_Front_v])

[Variable]
name='PrimaryAmp_FR_v'
value=[context.LatAmp_FR_v] * [context.LatMix_Front_v] + [context.LongAmp_FR_v] * (1.0 - [context.LatMix_Front_v])

[Variable]
name='PrimaryAmp_RL_v'
value=[context.LatAmp_RL_v] * [context.LatMix_Rear_v] + [context.LongAmp_RL_v] * (1.0 - [context.LatMix_Rear_v])

[Variable]
name='PrimaryAmp_RR_v'
value=[context.LatAmp_RR_v] * [context.LatMix_Rear_v] + [context.LongAmp_RR_v] * (1.0 - [context.LatMix_Rear_v])

[ExportProperty]
name='PrimaryAmp_FL'
value=[context.PrimaryAmp_FL_v]

[ExportProperty]
name='PrimaryAmp_FR'
value=[context.PrimaryAmp_FR_v]

[ExportProperty]
name='PrimaryAmp_RL'
value=[context.PrimaryAmp_RL_v]

[ExportProperty]
name='PrimaryAmp_RR'
value=[context.PrimaryAmp_RR_v]


; =============================================================================
; SECTION 7 - FL FULL DIAGNOSTIC CHAIN
; =============================================================================
; Every intermediate in the FL computation pipeline, in evaluation order.
; Use the SimHub property browser (filter "Diag_") to inspect while driving.
;
; Already exported earlier in this file (not duplicated here):
;   Diag_Raw_SA_FL, Diag_NormSA_FL, Diag_SAPeak_rad
;   Diag_TC_FL, Diag_TyreMod_FL
;   Diag_LoadFL, Diag_SpeedGate
;   Diag_Bell_FL, Diag_LatScale_FL
;   Diag_LA_FL_1_mult, Diag_LA_FL_2, Diag_LA_FL_3, Diag_LatAmp_FL_v
;
; Expected healthy ranges while driving at speed:
;   Diag_Raw_SR_FL       -0.3 to +0.3   (negative=braking, positive=wheelspin)
;   Diag_NormSR_FL        0.0 to 1.4    (1.0=peak, 1.4=full lockup/spin ceiling)
;   Diag_Raw_Press_FL     1.6 to 2.8 bar
;   Diag_CompBlend_FL     0.0 to 1.0    (0=GT3/slick at ≤2.0 bar, 1=road at ≥2.3 bar, linear blend between)
;   Diag_DirtMod_FL       0.65 to 1.0   (1.0=clean)
;   Diag_TempMod_FL       0.50 to 1.0   (1.0=optimal temperature)
;   Diag_WearMod_FL       0.70 to 1.0   (1.0=new tyre)
;   Diag_CompFreqOff_FL  -6 to +6 Hz
;   Diag_TempFreqOff_FL  -2 to +2 Hz
