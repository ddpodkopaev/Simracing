value=[context.Disp_F1_BrakeG_v] * 1.1

[ExportProperty]
name='Disp_Max_BrakeG'
value=[context.Disp_Max_BrakeG_v]

[Variable]
name='Disp_Max_LatG_v'
value=[context.Disp_F1_LatG_v] * 1.1

[ExportProperty]
name='Disp_Max_LatG'
value=[context.Disp_Max_LatG_v]

; Slip angle / ratio category reference lines (static horizontal markers on SA/SR chart):
[ExportProperty]
name='Disp_SA_F1'
value=[context.Disp_SA_F1_v]

[ExportProperty]
name='Disp_SA_Road'
value=[context.Disp_SA_Road_v]

[ExportProperty]
name='Disp_SA_Wet'
value=[context.Disp_SA_Wet_v]

[ExportProperty]
name='Disp_SR_F1'
value=[context.Disp_SR_F1_v]

[ExportProperty]
name='Disp_SR_Road'
value=[context.Disp_SR_Road_v]

[ExportProperty]
name='Disp_SR_Wet'
value=[context.Disp_SR_Wet_v]


; =============================================================================
; 9c — TYRE POTENTIAL  (middle layer — what the car can deliver right now)
; =============================================================================
; Lerps between road car G ceiling (TC=0, P_Stiff=2.8 bar) and F1 G ceiling (TC=1).
; TC_FL used as the pressure proxy across all three axes — front-left is
; representative of car-wide tyre setup (all four pressures track together in AC EVO).
;
; Render as a coloured reference line per chart. The band between this line and
; the axis top is the car's class headroom vs F1 — a GT3 at race pressure will
; sit roughly halfway up, a hypercar close to the top.

[Variable]
name='Disp_Car_AccelG_v'
value=[context.Disp_Road_AccelG_v] + ([context.Disp_F1_AccelG_v] - [context.Disp_Road_AccelG_v]) * [context.TC_FL]

[ExportProperty]
name='Disp_Car_AccelG'
value=[context.Disp_Car_AccelG_v]

[Variable]
name='Disp_Car_BrakeG_v'
value=[context.Disp_Road_BrakeG_v] + ([context.Disp_F1_BrakeG_v] - [context.Disp_Road_BrakeG_v]) * [context.TC_FL]

[ExportProperty]
name='Disp_Car_BrakeG'
value=[context.Disp_Car_BrakeG_v]

[Variable]
name='Disp_Car_LatG_v'
value=[context.Disp_Road_LatG_v] + ([context.Disp_F1_LatG_v] - [context.Disp_Road_LatG_v]) * [context.TC_FL]

[ExportProperty]
name='Disp_Car_LatG'
value=[context.Disp_Car_LatG_v]


; =============================================================================
; 9d — RAW TELEMETRY  (private intermediates — not exported)
; =============================================================================

[Variable]
name='IO_Throttle'
value=isnull([GameRawData.Physics.gas], 0.0)

[Variable]
name='IO_Brake'
value=isnull([GameRawData.Physics.brake], 0.0)

[Variable]
name='IO_Steer_Norm'
value=isnull([GameRawData.Physics.steerAngle], 0.0)

[Variable]
name='IO_AccG_Lat'
value=isnull([GameRawData.Physics.accG01], 0.0)

[Variable]
name='IO_AccG_Long'
value=isnull([GameRawData.Physics.accG02], 0.0)


; =============================================================================
; 9e — DRIVER INPUT  (top layer — what the driver is requesting)
; =============================================================================
; Each input is scaled so full commitment (pedal=1.0 or full lock) plots at
; Disp_Car_*G — the current car's estimated capability, not the F1 ceiling.
; The gap between the input line and the output area is the efficiency story:
; a good driver keeps the two close; a gap means unused capability or wheelspin/lockup.


; PAIR 1 — Throttle vs Acceleration G
; Throttle: pure driver intent — how hard are you asking for drive?
; At full throttle the line reaches the car's accel capability (Car_AccelG).
; Above that is the headroom between this car and an F1 car under power.

[Variable]
name='Disp_Throttle_Ga_v'
value=[context.IO_Throttle] * [context.Disp_Car_AccelG_v]

[ExportProperty]
name='Disp_Throttle_Ga'
value=[context.Disp_Throttle_Ga_v]


; PAIR 2 — Brake vs Braking G
; Brake pedal: driver intent under deceleration.
; The gap between Disp_Brake_Gb and Disp_BrakeG reveals:
;   — ABS activation (output drops while input stays high)
;   — Brake bias issues (one axle locking before the other)
;   — Progressive trail-braking (both signals declining together into corner apex)

[Variable]
name='Disp_Brake_Gb_v'
value=[context.IO_Brake] * [context.Disp_Car_BrakeG_v]

[ExportProperty]
name='Disp_Brake_Gb'
value=[context.Disp_Brake_Gb_v]


; PAIR 3 — Steering / Slip Angle vs Lateral G
; Two input proxies on the same chart — use one at full opacity, the other at 50 %:
;
;   Disp_Steer_Gl (steering wheel):
;     Driver intent. Rises immediately with lock input regardless of tyre state.
;     Useful for seeing how much steering angle you're applying before grip loads up.
;
;   Disp_SA_Gl (FL slip angle, normalised to pressure-derived SAPeak):
;     Tyre response. NormSA_FL=1.0 means the front-left is at its calculated grip limit.
;     Lags the steering signal at entry (tyre builds slip angle progressively).
;     At the limit: Steer rising + SA flat = understeer (front not responding).
;     SA exceeding Steer = snap — tyre overshot the limit faster than you corrected.
;
; Both scaled to Disp_Car_LatG so the signals are comparable to Disp_LatG.

[Variable]
name='Disp_Steer_Gl_v'
value=[context.IO_Steer_Norm] * [context.Disp_Car_LatG_v]

[ExportProperty]
name='Disp_Steer_Gl'
value=[context.Disp_Steer_Gl_v]

[Variable]
name='Disp_SA_Gl_v'
value=[context.NormSA_FL] * [context.Disp_Car_LatG_v]

[ExportProperty]
name='Disp_SA_Gl'
value=[context.Disp_SA_Gl_v]


; =============================================================================
; 9f — CAR OUTPUT  (area layer at 50 % opacity — what the car is actually doing)
; =============================================================================
; Raw G-force telemetry, sign-separated so each chart shows one polarity.
; Render as a filled area chart below the input line.
; When input and output areas overlap cleanly, the driver is using the car well.
; Output below input = the car isn't converting the request into G (lock, spin, aero).
; Output above input = traction events — the car generated G before the driver asked.

[Variable]
name='Disp_AccelG_v'
value=Max([context.IO_AccG_Long], 0.0)

[ExportProperty]
name='Disp_AccelG'
value=[context.Disp_AccelG_v]

[Variable]
name='Disp_BrakeG_v'
value=Max(-[context.IO_AccG_Long], 0.0)

[ExportProperty]
name='Disp_BrakeG'
value=[context.Disp_BrakeG_v]

[Variable]
name='Disp_LatG_v'
value=-1*[context.IO_AccG_Lat]

[ExportProperty]
name='Disp_LatG'
value=[context.Disp_LatG_v]

; Per-axle live slip ratio: the worse of the two wheels on that axle, sign stripped.
; Plotted on the SR chart alongside the static Disp_SR_F1/Road/Wet reference lines —
; lets you see how close the axle is to a category's lockup/wheelspin threshold without
; staring at four separate per-wheel traces. Front axle locks first under brake bias
; forward; rear axle lights up under power or trail-brake.

[Variable]
name='Disp_SR_Front_v'
value=Max(Abs([context.Raw_SR_FL]), Abs([context.Raw_SR_FR]))

[ExportProperty]
name='Disp_SR_Front'
value=[context.Disp_SR_Front_v]

[Variable]
name='Disp_SR_Rear_v'
value=Max(Abs([context.Raw_SR_RL]), Abs([context.Raw_SR_RR]))

[ExportProperty]
name='Disp_SR_Rear'
value=[context.Disp_SR_Rear_v]