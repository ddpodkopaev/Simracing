; RigConfig_BST.ini
; SimHub NCalcScripts - Hardware frequency profile for BST-1 / BST-2 transducers
; Place in: C:\Program Files (x86)\SimHub\NCalcScripts\
;
; This file is RIG-specific, not sim/car-specific. Edit once per physical setup.
; All values are exported globally and consumed by WheelSlipTactile_ACE.ini.
;
; EXPORTED PROPERTIES:
;   Rig_Front_FreqMin       Resting frequency floor, front (Hz)
;   Rig_Front_FreqMax       Frequency ceiling, front (Hz)
;   Rig_Front_FreqBase      Loaded resting state frequency, front (Hz) — ShakeIt isnull fallback
;   Rig_Front_Notch         Resonance notch to design around, front (Hz)
;   Rig_Front_LoadBand      Max Hz load can add, front
;   Rig_Front_SlipBand      Max Hz slip can add, front
;   Rig_Front_NotchGuard    Diagnostic: must be > 0. Alerts if load band exceeds notch margin.
;   Rig_Front_HarmMult      Harmonic layer frequency multiplier, front (dimensionless)
;
;   Rig_Rear_FreqMin        Resting frequency floor, rear (Hz)
;   Rig_Rear_FreqMax        Frequency ceiling, rear (Hz)
;   Rig_Rear_FreqBase       Loaded resting state frequency, rear (Hz) — ShakeIt isnull fallback
;   Rig_Rear_LoadBand       Max Hz load can add, rear
;   Rig_Rear_SlipBand       Max Hz slip can add, rear
;   Rig_Rear_HarmMult       Harmonic layer frequency multiplier, rear (dimensionless)


; =============================================================================
; BST-2 - FRONT / PEDALS
; Measured sweet spot: 42-55 Hz. Avoid ~46 Hz (resonance), ~80 Hz (rattle).
; Strategy: load anchors below notch, slip excitation jumps above it.
; =============================================================================

; Resting frequency floor. Keep at or below 44 Hz to stay clear of the 46 Hz notch.
[ExportProperty]
name='Rig_Front_FreqMin'
value=42

; Frequency ceiling. Keep below 75 Hz to avoid 80 Hz structural rattle.
[ExportProperty]
name='Rig_Front_FreqMax'
value=72

; Loaded resting-state frequency used as the isnull fallback in ShakeIt frequency
; formulas (in case the script hasn't computed yet on first frame).
; Set close to FreqMin + a small load contribution (parked wheel at rest).
[ExportProperty]
name='Rig_Front_FreqBase'
value=43

; Resonance notch centre (Hz). Load contribution is kept below this.
; Slip then carries frequency above it. Do not set lower than Rig_Front_FreqMin.
[ExportProperty]
name='Rig_Front_Notch'
value=46

; Max Hz that load adds (0-1 normalised load range).
; Rig_Front_FreqMin + Rig_Front_LoadBand must stay below Rig_Front_Notch.
[ExportProperty]
name='Rig_Front_LoadBand'
value=2

; Max Hz that slip adds. Carries frequency across the notch.
[ExportProperty]
name='Rig_Front_SlipBand'
value=23

; Notch guard diagnostic. Check DataCorePlugin.ExternalScript.Rig_Front_NotchGuard
; in the property browser - must always read > 0.
; If negative: reduce Rig_Front_LoadBand or increase Rig_Front_Notch.
[ExportProperty]
name='Rig_Front_NotchGuard'
value=[DataCorePlugin.ExternalScript.Rig_Front_Notch] - ([DataCorePlugin.ExternalScript.Rig_Front_FreqMin] + [DataCorePlugin.ExternalScript.Rig_Front_LoadBand])

; Harmonic layer frequency multiplier (front / BST-2 pedals).
; The detuned harmonic Custom Effect layer uses this directly in its FREQUENCY formula:
;   Min(isnull([DataCorePlugin.ExternalScript.Freq_Front], [DataCorePlugin.ExternalScript.Rig_Front_FreqBase])
;       * [DataCorePlugin.ExternalScript.Rig_Front_HarmMult], 78)
; The Min(..., 78) cap keeps the harmonic below the 80 Hz rattle ceiling.
;
; Ratio guide (relative to fundamental):
;   2.00  = octave          clean doubling, no beating
;   1.50  = perfect 5th     harmonious, natural tyre scrub character
;   1.47  = flat 5th        ~1.5 Hz beat at 42 Hz floor — organic grittiness (DEFAULT)
;   1.33  = perfect 4th     open, less dissonant, wider spread
;   0.75  = sub-fifth       low-frequency mass, pronounced on physical pedals
;
; 1.47 and 1.52 (rear) are intentionally offset from each other to prevent
; constructive interference when both actuators are active at the same time.
[ExportProperty]
name='Rig_Front_HarmMult'
value=1.47


; =============================================================================
; BST-1 - REAR / SEAT
; Measured sweet spot: 28-35 Hz strong, 70 Hz still detailed.
; Strategy: anchor at resonant peak, load deepens, slip adds texture upward.
; =============================================================================

; Resting frequency floor. 28 Hz is the measured resonant peak - use as anchor.
[ExportProperty]
name='Rig_Rear_FreqMin'
value=28

; Frequency ceiling.
[ExportProperty]
name='Rig_Rear_FreqMax'
value=68

; Loaded resting-state frequency — ShakeIt isnull fallback (see front equivalent).
; 33 Hz represents FreqMin + moderate load contribution at a standing start.
[ExportProperty]
name='Rig_Rear_FreqBase'
value=33

; Max Hz that load adds. Larger than front - seat conveys chassis weight shift.
[ExportProperty]
name='Rig_Rear_LoadBand'
value=10

; Max Hz that slip adds. Adds texture and oversteer onset feel.
[ExportProperty]
name='Rig_Rear_SlipBand'
value=18

; Harmonic layer frequency multiplier (rear / BST-1 seat).
; Set slightly above 1.5 to detune from Rig_Front_HarmMult (1.47) and avoid
; constructive interference between front and rear harmonic layers.
;
; At FreqMin=28 Hz: 28 * 1.52 = 42.6 Hz (coincides neatly with front FreqMin).
; At FreqMax=68 Hz: 68 * 1.52 = 103 Hz. Cap harmonic layer in ShakeIt at 65 Hz.
; FREQUENCY formula for rear harmonic effect:
;   Min(isnull([DataCorePlugin.ExternalScript.Freq_Rear], [DataCorePlugin.ExternalScript.Rig_Rear_FreqBase])
;       * [DataCorePlugin.ExternalScript.Rig_Rear_HarmMult], 65)
[ExportProperty]
name='Rig_Rear_HarmMult'
value=1.52

