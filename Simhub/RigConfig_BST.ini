; RigConfig_BST.ini
; SimHub NCalcScripts - Hardware frequency profile for BST-1 / BST-2 transducers
; Place in: C:\Program Files (x86)\SimHub\NCalcScripts\
;
; This file is RIG-specific, not sim/car-specific. Edit once per physical setup.
; All values are exported globally and consumed by WheelSlipTactile_ACE.ini.
;
; PER-CORNER TUNING: Users with per-corner transducers can now tune each wheel independently.
; For setups with symmetrical transducers (e.g., FL=FR both BST-2, RL=RR both BST-1),
; values will start identical per pair. Users can diverge them later if needed.
;
; EXPORTED PROPERTIES (per-corner):
; Front-Left (BST-2):
;   Rig_FL_FreqMin    Resting frequency floor, front-left (Hz)
;   Rig_FL_FreqMax    Frequency ceiling, front-left (Hz)
;   Rig_FL_FreqBase   Loaded resting state frequency, front-left (Hz) — ShakeIt isnull fallback
;   Rig_FL_Notch      Resonance notch to design around, front-left (Hz)
;   Rig_FL_LoadBand   Max Hz load can add, front-left
;   Rig_FL_SlipBand   Max Hz slip can add, front-left
;   Rig_FL_NotchGuard Diagnostic: must be > 0. Alerts if load band exceeds notch margin.
;   Rig_FL_HarmMult   Harmonic layer frequency multiplier, front-left (dimensionless)
;
; Front-Right (BST-2):
;   Rig_FR_FreqMin    Resting frequency floor, front-right (Hz)
;   Rig_FR_FreqMax    Frequency ceiling, front-right (Hz)
;   Rig_FR_FreqBase   Loaded resting state frequency, front-right (Hz) — ShakeIt isnull fallback
;   Rig_FR_Notch      Resonance notch to design around, front-right (Hz)
;   Rig_FR_LoadBand   Max Hz load can add, front-right
;   Rig_FR_SlipBand   Max Hz slip can add, front-right
;   Rig_FR_NotchGuard Diagnostic: must be > 0. Alerts if load band exceeds notch margin.
;   Rig_FR_HarmMult   Harmonic layer frequency multiplier, front-right (dimensionless)
;
; Rear-Left (BST-1):
;   Rig_RL_FreqMin     Resting frequency floor, rear-left (Hz)
;   Rig_RL_FreqMax     Frequency ceiling, rear-left (Hz)
;   Rig_RL_FreqBase    Loaded resting state frequency, rear-left (Hz) — ShakeIt isnull fallback
;   Rig_RL_LoadBand    Max Hz load can add, rear-left
;   Rig_RL_SlipBand    Max Hz slip can add, rear-left
;   Rig_RL_HarmMult    Harmonic layer frequency multiplier, rear-left (dimensionless)
;
; Rear-Right (BST-1):
;   Rig_RR_FreqMin     Resting frequency floor, rear-right (Hz)
;   Rig_RR_FreqMax     Frequency ceiling, rear-right (Hz)
;   Rig_RR_FreqBase    Loaded resting state frequency, rear-right (Hz) — ShakeIt isnull fallback
;   Rig_RR_LoadBand    Max Hz load can add, rear-right
;   Rig_RR_SlipBand    Max Hz slip can add, rear-right
;   Rig_RR_HarmMult    Harmonic layer frequency multiplier, rear-right (dimensionless)


; =============================================================================
; BST-2 - FRONT-LEFT / PEDALS
; Measured sweet spot: 42-55 Hz. Avoid ~46 Hz (resonance), ~80 Hz (rattle).
; Strategy: load anchors below notch, slip excitation jumps above it.
; =============================================================================

; Resting frequency floor. Keep at or below 44 Hz to stay clear of the 46 Hz notch.
[ExportProperty]
name='Rig_FL_FreqMin'
value=42

; Frequency ceiling. Keep below 75 Hz to avoid 80 Hz structural rattle.
[ExportProperty]
name='Rig_FL_FreqMax'
value=72

; Loaded resting-state frequency used as the isnull fallback in ShakeIt frequency
; formulas (in case the script hasn't computed yet on first frame).
; Set close to FreqMin + a small load contribution (parked wheel at rest).
[ExportProperty]
name='Rig_FL_FreqBase'
value=43

; Resonance notch centre (Hz). Load contribution is kept below this.
; Slip then carries frequency above it. Do not set lower than Rig_FL_FreqMin.
[ExportProperty]
name='Rig_FL_Notch'
value=46

; Max Hz that load adds (0-1 normalised load range).
; Rig_FL_FreqMin + Rig_FL_LoadBand must stay below Rig_FL_Notch.
[ExportProperty]
name='Rig_FL_LoadBand'
value=2

; Max Hz that slip adds. Carries frequency across the notch.
[ExportProperty]
name='Rig_FL_SlipBand'
value=23

; Notch guard diagnostic. Check DataCorePlugin.ExternalScript.Rig_FL_NotchGuard
; in the property browser - must always read > 0.
; If negative: reduce Rig_FL_LoadBand or increase Rig_FL_Notch.
[ExportProperty]
name='Rig_FL_NotchGuard'
value=[DataCorePlugin.ExternalScript.Rig_FL_Notch] - ([DataCorePlugin.ExternalScript.Rig_FL_FreqMin] + [DataCorePlugin.ExternalScript.Rig_FL_LoadBand])

; Harmonic layer frequency multiplier (front-left / BST-2 pedals).
; Ratio guide (relative to fundamental):
;   1.47  = flat 5th        ~1.5 Hz beat at 42 Hz floor — organic grittiness (DEFAULT)
;   1.50  = perfect 5th     harmonious, natural tyre scrub character
;   1.33  = perfect 4th     open, less dissonant, wider spread
;   2.00  = octave          clean doubling, no beating
;   0.75  = sub-fifth       low-frequency mass, pronounced on physical pedals
;
; 1.47 and 1.52 are intentionally offset to prevent constructive interference
; when both front and rear actuators are active at the same time.
[ExportProperty]
name='Rig_FL_HarmMult'
value=1.47


; =============================================================================
; BST-2 - FRONT-RIGHT / PEDALS
; Measured sweet spot: 42-55 Hz. Avoid ~46 Hz (resonance), ~80 Hz (rattle).
; Strategy: load anchors below notch, slip excitation jumps above it.
; Starts identical to FL; tune diverge if needed for asymmetric setups.
; =============================================================================

; Resting frequency floor. Keep at or below 44 Hz to stay clear of the 46 Hz notch.
[ExportProperty]
name='Rig_FR_FreqMin'
value=42

; Frequency ceiling. Keep below 75 Hz to avoid 80 Hz structural rattle.
[ExportProperty]
name='Rig_FR_FreqMax'
value=72

; Loaded resting-state frequency used as the isnull fallback in ShakeIt frequency
; formulas (in case the script hasn't computed yet on first frame).
; Set close to FreqMin + a small load contribution (parked wheel at rest).
[ExportProperty]
name='Rig_FR_FreqBase'
value=43

; Resonance notch centre (Hz). Load contribution is kept below this.
; Slip then carries frequency above it. Do not set lower than Rig_FR_FreqMin.
[ExportProperty]
name='Rig_FR_Notch'
value=46

; Max Hz that load adds (0-1 normalised load range).
; Rig_FR_FreqMin + Rig_FR_LoadBand must stay below Rig_FR_Notch.
[ExportProperty]
name='Rig_FR_LoadBand'
value=2

; Max Hz that slip adds. Carries frequency across the notch.
[ExportProperty]
name='Rig_FR_SlipBand'
value=23

; Notch guard diagnostic. Check DataCorePlugin.ExternalScript.Rig_FR_NotchGuard
; in the property browser - must always read > 0.
; If negative: reduce Rig_FR_LoadBand or increase Rig_FR_Notch.
[ExportProperty]
name='Rig_FR_NotchGuard'
value=[DataCorePlugin.ExternalScript.Rig_FR_Notch] - ([DataCorePlugin.ExternalScript.Rig_FR_FreqMin] + [DataCorePlugin.ExternalScript.Rig_FR_LoadBand])

; Harmonic layer frequency multiplier (front-right / BST-2 pedals).
; Starts identical to FL. Offset from rear multiplier (1.52) to prevent constructive interference.
[ExportProperty]
name='Rig_FR_HarmMult'
value=1.47

; =============================================================================
; BST-1 - REAR-LEFT / SEAT
; Measured sweet spot: 28-35 Hz strong, 70 Hz still detailed.
; Strategy: anchor at resonant peak, load deepens, slip adds texture upward.
; =============================================================================

; Resting frequency floor. 28 Hz is the measured resonant peak - use as anchor.
[ExportProperty]
name='Rig_RL_FreqMin'
value=28

; Frequency ceiling.
[ExportProperty]
name='Rig_RL_FreqMax'
value=68

; Loaded resting-state frequency — ShakeIt isnull fallback (see front equivalent).
; 33 Hz represents FreqMin + moderate load contribution at a standing start.
[ExportProperty]
name='Rig_RL_FreqBase'
value=33

; Max Hz that load adds. Larger than front - seat conveys chassis weight shift.
[ExportProperty]
name='Rig_RL_LoadBand'
value=10

; Max Hz that slip adds. Adds texture and oversteer onset feel.
[ExportProperty]
name='Rig_RL_SlipBand'
value=18

; Harmonic layer frequency multiplier (rear-left / BST-1 seat).
; Set slightly above 1.5 to detune from front (1.47) and avoid
; constructive interference between front and rear harmonic layers.
;
; At FreqMin=28 Hz: 28 * 1.52 = 42.6 Hz (coincides neatly with front FreqMin).
; At FreqMax=68 Hz: 68 * 1.52 = 103 Hz. Cap harmonic layer in ShakeIt at 65 Hz.
[ExportProperty]
name='Rig_RL_HarmMult'
value=1.52


; =============================================================================
; BST-1 - REAR-RIGHT / SEAT
; Measured sweet spot: 28-35 Hz strong, 70 Hz still detailed.
; Strategy: anchor at resonant peak, load deepens, slip adds texture upward.
; Starts identical to RL; tune diverge if needed for asymmetric setups.
; =============================================================================

; Resting frequency floor. 28 Hz is the measured resonant peak - use as anchor.
[ExportProperty]
name='Rig_RR_FreqMin'
value=28

; Frequency ceiling.
[ExportProperty]
name='Rig_RR_FreqMax'
value=68

; Loaded resting-state frequency — ShakeIt isnull fallback (see front equivalent).
; 33 Hz represents FreqMin + moderate load contribution at a standing start.
[ExportProperty]
name='Rig_RR_FreqBase'
value=33

; Max Hz that load adds. Larger than front - seat conveys chassis weight shift.
[ExportProperty]
name='Rig_RR_LoadBand'
value=10

; Max Hz that slip adds. Adds texture and oversteer onset feel.
[ExportProperty]
name='Rig_RR_SlipBand'
value=18

; Harmonic layer frequency multiplier (rear-right / BST-1 seat).
; Starts identical to RL. Offset from front (1.47) to prevent constructive interference.
[ExportProperty]
name='Rig_RR_HarmMult'
value=1.52

